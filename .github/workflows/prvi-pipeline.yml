name: Prvi CI pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  pozdrav:
    runs-on: ubuntu-latest
    steps:
      - name: Preuzmi kod iz repoa
        uses: actions/checkout@v4

      - name: Pokazi info o eventu
        run: |
          echo "Pokrenuo: ${{ github.actor }}"
          echo "Grana: ${{ github.ref }}"
          echo "Commit: ${{ github.sha }}"
          echo "Event tip: ${{ github.event_name }}"

      - name: Listaj fajlove iz repoa
        run: ls -la

      - name: Prikazi sadrzaj pre-deploy-check.sh
        run: cat pre-deploy-check.sh
      - name: Test secreta
        env:
          MOJ_SECRET: ${{ secrets.DEMO_SECRET }}
        run: |
          echo "Duzina secreta:"
          echo -n "$MOJ_SECRET" | wc -c
